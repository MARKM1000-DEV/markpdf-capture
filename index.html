<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MarkPDF — Captura de Documento</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F5F7;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1D1D1F;
    }

    .card {
      background: #fff;
      border-radius: 28px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #7C3AED, #4F46E5);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 26px; height: 26px; fill: none; stroke: white; stroke-width: 2; }

    h1 { font-size: 20px; font-weight: 800; text-align: center; }
    p.sub { font-size: 13px; color: #6B7280; text-align: center; line-height: 1.5; }

    /* CÓDIGO */
    .code-box {
      width: 100%;
      background: #F5F3FF;
      border: 2px solid #DDD6FE;
      border-radius: 20px;
      padding: 18px;
      text-align: center;
      display: none;
    }
    .code-label { font-size: 11px; font-weight: 700; color: #7C3AED; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
    .code-digits { font-size: 42px; font-weight: 900; letter-spacing: 0.12em; color: #4C1D95; font-variant-numeric: tabular-nums; }
    .code-hint { font-size: 12px; color: #8B5CF6; margin-top: 4px; }

    /* TIMER */
    .timer-bar-wrap {
      width: 100%;
      display: none;
    }
    .timer-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 700;
      color: #6B7280;
      margin-bottom: 6px;
    }
    .timer-label span { color: #7C3AED; }
    .timer-track {
      width: 100%;
      height: 6px;
      background: #E5E7EB;
      border-radius: 99px;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #7C3AED, #4F46E5);
      border-radius: 99px;
      transition: width 1s linear, background 1s;
      width: 100%;
    }
    .timer-fill.urgent { background: linear-gradient(90deg, #EF4444, #F97316); }

    /* STATUS */
    #status-box {
      width: 100%;
      padding: 11px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      transition: all 0.3s;
    }
    .status-loading  { background: #F3F4F6; color: #6B7280; }
    .status-waiting  { background: #FEF3C7; color: #92400E; }
    .status-ready    { background: #D1FAE5; color: #065F46; }
    .status-occupied { background: #FEE2E2; color: #991B1B; }
    .status-sending  { background: #EDE9FE; color: #5B21B6; }
    .status-sent     { background: #D1FAE5; color: #065F46; }
    .status-error    { background: #FEE2E2; color: #991B1B; }
    .status-expired  { background: #FEF3C7; color: #92400E; }

    /* PREVIEW */
    #preview-wrap { width: 100%; display: none; flex-direction: column; align-items: center; gap: 12px; }
    #preview { width: 100%; max-height: 260px; object-fit: contain; border-radius: 16px; border: 2px solid #E5E7EB; background: #F9FAFB; }

    .btn {
      width: 100%; padding: 15px; border-radius: 18px; border: none;
      font-size: 15px; font-weight: 800; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary   { background: #7C3AED; color: white; }
    .btn-secondary { background: #F3F4F6; color: #374151; }
    .btn-send      { background: #059669; color: white; }

    input[type="file"] { display: none; }

    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .privacy-note { font-size: 11px; color: #9CA3AF; text-align: center; line-height: 1.5; }
    #btn-group { width: 100%; display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </div>

    <div>
      <h1>MarkPDF Captura</h1>
      <p class="sub" style="margin-top:4px">Digite o código abaixo no computador e tire a foto do documento.</p>
    </div>

    <div class="code-box" id="code-box">
      <div class="code-label">Código de sessão</div>
      <div class="code-digits" id="code-display">--------</div>
      <div class="code-hint">Digite este código no MarkPDF</div>
    </div>

    <div class="timer-bar-wrap" id="timer-wrap">
      <div class="timer-label">
        <span>Sessão expira em</span>
        <span id="timer-text">3:00</span>
      </div>
      <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
    </div>

    <div id="status-box" class="status-loading">Gerando código seguro...</div>

    <div id="preview-wrap">
      <img id="preview" src="" alt="Pré-visualização" />
      <button class="btn btn-secondary" id="btn-retake">↩ Tirar outra foto</button>
      <button class="btn btn-send" id="btn-send">Enviar para o computador</button>
    </div>

    <div id="btn-group" style="display:none">
      <button class="btn btn-primary" id="btn-camera">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Usar Câmera
      </button>
      <button class="btn btn-secondary" id="btn-gallery">📁 Escolher da Galeria</button>
    </div>

    <input type="file" id="file-camera"  accept="image/*" capture="environment" />
    <input type="file" id="file-gallery" accept="image/*" />

    <p class="privacy-note">🔒 Conexão direta P2P — nenhuma imagem armazenada em servidores</p>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    const TIMEOUT_MS = 3 * 60 * 1000; // 3 minutos

    const statusBox   = document.getElementById('status-box');
    const codeBox     = document.getElementById('code-box');
    const codeDisplay = document.getElementById('code-display');
    const timerWrap   = document.getElementById('timer-wrap');
    const timerText   = document.getElementById('timer-text');
    const timerFill   = document.getElementById('timer-fill');
    const btnGroup    = document.getElementById('btn-group');
    const previewWrap = document.getElementById('preview-wrap');
    const previewImg  = document.getElementById('preview');
    const btnCamera   = document.getElementById('btn-camera');
    const btnGallery  = document.getElementById('btn-gallery');
    const btnRetake   = document.getElementById('btn-retake');
    const btnSend     = document.getElementById('btn-send');
    const fileCamera  = document.getElementById('file-camera');
    const fileGallery = document.getElementById('file-gallery');

    let conn = null;
    let pendingDataUrl = null;
    let sessionOccupied = false;
    let timerInterval = null;
    let peer = null;

    function setStatus(msg, cls) {
      statusBox.textContent = msg;
      statusBox.className = cls;
    }

    function gerarCodigo() {
      return String(Math.floor(10000000 + Math.random() * 90000000));
    }

    function iniciarTimer() {
      const inicio = Date.now();
      timerWrap.style.display = 'block';

      timerInterval = setInterval(() => {
        const elapsed = Date.now() - inicio;
        const restante = Math.max(0, TIMEOUT_MS - elapsed);
        const pct = (restante / TIMEOUT_MS) * 100;

        const min = Math.floor(restante / 60000);
        const sec = Math.floor((restante % 60000) / 1000);
        timerText.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
        timerFill.style.width = pct + '%';

        if (pct < 30) timerFill.classList.add('urgent');
        else timerFill.classList.remove('urgent');

        if (restante === 0) {
          clearInterval(timerInterval);
          if (!sessionOccupied) {
            setStatus('Sessão expirada. Recarregando...', 'status-expired');
            setTimeout(() => location.reload(), 1500);
          }
        }
      }, 1000);
    }

    function iniciarSessao() {
      const codigo = gerarCodigo();
      const peerId = 'mkpdf-' + codigo;

      peer = new Peer(peerId);

      peer.on('open', () => {
        codeDisplay.textContent = codigo;
        codeBox.style.display = 'block';
        setStatus('Aguardando o computador conectar...', 'status-waiting');
        iniciarTimer();
      });

      peer.on('connection', (c) => {
        // Bloqueia segunda conexão
        if (sessionOccupied) {
          c.close();
          return;
        }

        sessionOccupied = true;
        conn = c;

        conn.on('open', () => {
          clearInterval(timerInterval);
          timerWrap.style.display = 'none';
          setStatus('✅ Conectado ao computador!', 'status-ready');
          btnGroup.style.display = 'flex';
        });

        conn.on('close', () => {
          setStatus('Conexão encerrada. Recarregue para nova sessão.', 'status-error');
          btnGroup.style.display = 'none';
        });

        conn.on('error', () => setStatus('Erro na conexão.', 'status-error'));
      });

      peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
          // Código em uso — gerar novo automaticamente
          peer.destroy();
          iniciarSessao();
        } else {
          setStatus('Erro ao criar sessão. Recarregue a página.', 'status-error');
        }
      });
    }

    function processFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        pendingDataUrl = e.target.result;
        previewImg.src = pendingDataUrl;
        previewWrap.style.display = 'flex';
        btnGroup.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    btnCamera.addEventListener('click',  () => fileCamera.click());
    btnGallery.addEventListener('click', () => fileGallery.click());
    fileCamera.addEventListener('change',  (e) => processFile(e.target.files[0]));
    fileGallery.addEventListener('change', (e) => processFile(e.target.files[0]));

    btnRetake.addEventListener('click', () => {
      pendingDataUrl = null;
      previewWrap.style.display = 'none';
      btnGroup.style.display = 'flex';
      fileCamera.value = '';
      fileGallery.value = '';
    });

    btnSend.addEventListener('click', () => {
      if (!conn || !pendingDataUrl) return;
      btnSend.disabled = true;
      btnSend.innerHTML = '<span class="spinner"></span> Enviando...';
      setStatus('Enviando imagem...', 'status-sending');

      try {
        conn.send(pendingDataUrl);
        setTimeout(() => {
          setStatus('✅ Imagem enviada com sucesso!', 'status-sent');
          btnSend.innerHTML = '✅ Enviado!';
          setTimeout(() => {
            pendingDataUrl = null;
            previewWrap.style.display = 'none';
            btnGroup.style.display = 'flex';
            btnSend.disabled = false;
            btnSend.innerHTML = 'Enviar para o computador';
            setStatus('✅ Conectado — pronto para nova foto', 'status-ready');
            fileCamera.value = '';
            fileGallery.value = '';
          }, 2000);
        }, 400);
      } catch (err) {
        setStatus('Erro ao enviar. Tente novamente.', 'status-error');
        btnSend.disabled = false;
        btnSend.innerHTML = 'Enviar para o computador';
      }
    });

    iniciarSessao();
  </script>
</body>
</html>
